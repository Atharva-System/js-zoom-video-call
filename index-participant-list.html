<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Participants</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="participants-container">
      <!-- Header-->
      <div class="header">
        <button class="back-btn">
          <img
            src="src/assets/participants-action-svg/back.svg"
            class="avatar"
          />
        </button>
        <h2 class="title">Participants</h2>
      </div>

      <!-- Dynamic Participants List -->
      <div id="all-participants-list">
        <!-- Item -->
        <div class="participant-card" id="participant-1">
          <div class="left">
            <img src="https://i.pravatar.cc/100?img=1" class="avatar" />
            <span class="name">Amelia</span>
          </div>
          <!-- Action Button -->
          <div class="actions">
            <span class="icon chat" title="Start chat">
              <img
                src="src/assets/participants-action-svg/start_message.svg"
                alt="Start chat"
              />
            </span>
            <span class="icon warning" title="Warning user">
              <img
                src="src/assets/participants-action-svg/warning_message.svg"
                alt="Warning icon"
              />
            </span>
            <span class="icon remove" title="Remove user">
              <img
                src="src/assets/participants-action-svg/remove_user.svg"
                alt="Remove user"
              />
            </span>
          </div>
        </div>

        <div class="participant-card" id="participant-2">
          <div class="left">
            <img src="https://i.pravatar.cc/100?img=1" class="avatar" />
            <span class="name">Amelia</span>
            <span class="icon chat" title="Start chat">
              <img
                src="src/assets/participants-action-svg/start_message.svg"
                alt="Start chat"
              />
            </span>
          </div>
          <div class="actions">
            <span class="icon warning" title="Warning user">
              <img
                src="src/assets/participants-action-svg/warning_message.svg"
                alt="Warning icon"
              />
            </span>
            <span class="icon remove" title="Remove user">
              <img
                src="src/assets/participants-action-svg/remove_user.svg"
                alt="Remove user"
              />
            </span>
          </div>
        </div>
      </div>
      <!-- Dynamic Participants List -->
    </div>
  </body>
</html>
